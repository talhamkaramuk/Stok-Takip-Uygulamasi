name: STOKIO CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stokio_test
          POSTGRES_USER: stokio
          POSTGRES_PASSWORD: stokio_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stokio -d stokio_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore STOKIO.sln

      - name: Unit and service tests
        run: dotnet test STOKIO.sln --no-restore

      - name: PostgreSQL relational integration tests
        run: dotnet test STOKIO.sln --no-restore --filter "Layer=RelationalIntegration"
        env:
          STOKIO_TEST_POSTGRES_CONNECTION_STRING: Host=localhost;Port=5432;Database=stokio_test;Username=stokio;Password=stokio_dev_password

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: API Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f src/STOKIO.Api/Dockerfile -t stokio-api:ci .
