services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stokio}
      POSTGRES_USER: ${POSTGRES_USER:-stokio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stokio_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stokio} -d ${POSTGRES_DB:-stokio}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/STOKIO.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${STOKIO_CONNECTION_STRING:-Host=postgres;Port=5432;Database=stokio;Username=stokio;Password=stokio_dev_password}
      Database__EnsureCreated: ${STOKIO_ENSURE_CREATED:-true}
      Database__ApplyDevelopmentSchemaPatches: ${STOKIO_APPLY_DEVELOPMENT_SCHEMA_PATCHES:-true}
      Database__SeedDevelopmentData: ${STOKIO_SEED_DEVELOPMENT_DATA:-true}
      Jwt__Issuer: STOKIO.Api
      Jwt__Audience: STOKIO.Web
      Jwt__SigningKey: ${STOKIO_JWT_SIGNING_KEY:-development-only-change-this-32-byte-minimum-key}
      Jwt__AccessTokenMinutes: ${STOKIO_ACCESS_TOKEN_MINUTES:-15}
      Cors__AllowedOrigins__0: http://localhost:5173
      Exports__StoragePath: ${STOKIO_EXPORTS_STORAGE_PATH:-/var/lib/stokio/export-files}
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    volumes:
      - api_export_files:/var/lib/stokio/export-files
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: node:22-alpine
    working_dir: /app
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      VITE_DEV_PROXY_TARGET: ${VITE_DEV_PROXY_TARGET:-http://api:8080}
      VITE_ENABLE_DEMO_CREDENTIALS: ${VITE_ENABLE_DEMO_CREDENTIALS:-true}
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  api_export_files:
  web_node_modules:
